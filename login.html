<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="container">

  <h2>Login</h2>

  <form id="loginForm">

    <input 
      type="email"
      id="loginEmail"
      placeholder="Enter Email"
      required
    >

    <input 
      type="password"
      id="loginPassword"
      placeholder="Enter Password"
      required
    >

    <button type="submit">
      Login
    </button>

  </form>

  <div id="error"></div>

  <p>
    Don't have an account?
    <a href="signup.html">Signup</a>
  </p>

</div>

<!-- External JS -->
<script src="auth.js"></script>

</body>
</html>
