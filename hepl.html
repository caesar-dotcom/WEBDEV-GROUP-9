<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Center</title>

  <link rel="stylesheet" href="help.css">
</head>
<body>

  <section class="help-hero">

    <h1>Help Center</h1>

    <p>
      Find answers to common questions.
    </p>

  </section>

  <section class="faq-section">

    <div class="faq-box">

      <h2>How do I apply for jobs?</h2>

      <p>
        Click the Apply button and complete the application form.
      </p>

    </div>

    <div class="faq-box">

      <h2>How do employers post jobs?</h2>

      <p>
        Employers can use the Post a Job section to publish vacancies.
      </p>

    </div>

    <div class="faq-box">

      <h2>Is registration free?</h2>

      <p>
        Yes, registration is completely free.
      </p>

    </div>

  </section>

</body>
</html>
